[project]
name = "usgs-earthquakes-workspace"
version = "0.1.0"
description = "USGS earthquake workspace with incremental loading and freshness cascade"
requires-python = ">=3.12"
dependencies = [
    "dlt[motherduck,workspace,hub]",
    "dlthub",
    "duckdb<1.5",
    "dlt-runtime",
    "marimo>=0.19.0",
    "altair>=6.0.0",
    "pandas>=3.0.0",
]

[dependency-groups]
ibis = ["ibis-framework[duckdb]"]

[tool.uv.sources]
dlt = { path = "../../dlt", editable = true }
dlt-runtime = { path = "../../runtime/cli", editable = true }
