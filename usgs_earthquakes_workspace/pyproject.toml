[project]
name = "usgs-earthquakes-workspace"
version = "0.1.0"
description = "USGS earthquake workspace with incremental loading and freshness cascade"
requires-python = ">=3.12"
dependencies = [
    "dlt[motherduck,workspace]",
    "dlthub",
    "duckdb<1.5",
    "marimo>=0.19.0",
    "altair>=6.0.0",
    "pandas>=3.0.0",
    "dlt-runtime>=0.25.0a1",
]

[dependency-groups]
ibis = ["ibis-framework[duckdb]"]

[tool.uv.sources]
dlt = { url="https://github.com/dlt-hub/dlt/archive/refs/heads/feat/workspace-deployment.zip?v=8"}
